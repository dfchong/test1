<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本地化 HLS 播放测试</title>
    
    <link href="/js/video-js.min.css" rel="stylesheet" />
    
    <style>
        body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .video-box { width: 100%; max-width: 900px; }
    </style>
</head>
<body>

<div class="video-box">
    <video id="my-player" class="video-js vjs-default-skin vjs-16-9 vjs-big-play-centered" controls preload="auto">
        <source src="https://qcwdvf.bluepod.win/vedios/addnodes/index.m3u8" type="application/x-mpegURL">
    </video>
</div>

<script src="/js/video.min.js"></script>

<script>
    // 初始化播放器
    var player = videojs('my-player', {
        fluid: true, // 自适应容器宽度
        language: 'zh-CN',
        playbackRates: [0.5, 1, 1.5, 2] // 增加倍速播放功能
    });

    player.ready(function() {
        console.log('播放器本地库加载成功');
    });
</script>

</body>
</html>
